<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(to right, #ffdde1, #ee9ca7);
    }

    /* Background collage */
    .collage img {
        position: absolute;
        width: 140px;
        height: 180px;
        object-fit: cover;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        opacity: 0.85;
    }

    /* Center card */
    .card {
        position: relative;
        z-index: 10;
        background: white;
        padding: 35px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        width: 85%;
        max-width: 420px;
        margin: auto;
        top: 50%;
        transform: translateY(-50%);
    }

    h1 {
        color: #ff4d6d;
        font-size: 28px;
    }

    .heart {
        font-size: 42px;
        animation: beat 1s infinite;
    }

    @keyframes beat {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.25); }
    }

    /* Confetti */
    .confetti {
        position: fixed;
        top: -10px;
        width: 10px;
        height: 10px;
        animation: fall linear forwards;
        z-index: 100;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh) rotate(360deg);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<!-- Background Image Collage -->
<div class="collage">
    <img src="img1.jpg" style="top:5%; left:8%;">
    <img src="img2.jpg" style="top:20%; right:10%;">
    <img src="img3.jpg" style="bottom:15%; left:12%;">
    <img src="img4.jpg" style="bottom:10%; right:15%;">
    <img src="img5.jpg" style="top:40%; left:35%;">
</div>

<!-- Main Card -->
<div class="card">
    <h1>Happiest Birthday Sassa 💝🐇</h1>
    <div class="heart">❤️</div>
</div>

<!-- Confetti Script -->
<script>
    function createConfetti() {
        for (let i = 0; i < 120; i++) {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.backgroundColor =
                ["#ff4d6d", "#ffb703", "#9b5de5", "#00f5d4", "#ffafcc"]
                [Math.floor(Math.random() * 5)];
            confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 5000);
        }
    }

    window.onload = createConfetti;
</script>

</body>
</html>
