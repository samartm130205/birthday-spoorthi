<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* Background collage */
.collage {
    position: fixed;
    inset: 0;
    z-index: -1;
}

.collage img {
    position: absolute;
    width: 140px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    opacity: 0.4;
    cursor: pointer;
    animation: float 8s ease-in-out infinite;
    transition: all 0.4s ease;
}

/* floating movement */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
}

/* Fullscreen zoomed image */
.zoomed {
    position: fixed !important;
    inset: 0 !important;
    width: auto !important;
    height: auto !important;
    max-width: 90vw !important;
    max-height: 90vh !important;
    margin: auto !important;
    opacity: 1 !important;
    z-index: 999;
    animation: none;
}

/* Overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 998;
}

/* Floating text (NO white box) */
.text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    padding: 20px;
    animation: textFloat 6s ease-in-out infinite;
}

@keyframes textFloat {
    0% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-15px); }
    100% { transform: translate(-50%, -50%) translateY(0); }
}

.text h1 {
    font-size: 26px;
    margin-bottom: 10px;
}

.text p {
    font-size: 15px;
    line-height: 1.7;
}

/* Heart beat */
.heart {
    font-size: 40px;
    animation: beat 1s infinite;
    margin-top: 10px;
}

@keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.25); }
}

/* Confetti */
.confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    animation: fall linear forwards;
    z-index: 100;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="collage">
    <img src="1000037570.jpeg" style="top:5%; left:8%;">
    <img src="1000037580.jpeg" style="top:20%; right:10%;">
    <img src="1000375141.jpeg" style="bottom:15%; left:12%;">
    <img src="1000375155.jpeg" style="bottom:10%; right:15%;">
    <img src="1000375158.jpeg" style="top:40%; left:35%;">
</div>

<!-- Floating Text -->
<div class="text">
    <h1>Happiest Birthday Sassa 💝🐇</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨<br><br>

        May all your dreams come true and make everyone proud 💪🏻🥹<br><br>

        You mean a lot to me 💝🥹<br>
        You have such a pure, kind and caring heart<br>
        and I feel truly lucky and grateful to have you in my life 🫶🏻💗
    </p>
    <div class="heart">❤️</div>
</div>

<script>
// Confetti forever
function createConfetti() {
    const confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.backgroundColor =
        ["#ff4d6d", "#ffb703", "#9b5de5", "#00f5d4", "#ffafcc"]
        [Math.floor(Math.random() * 5)];
    confetti.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 6000);
}
setInterval(createConfetti, 150);

// Image zoom on tap
const images = document.querySelectorAll(".collage img");

images.forEach(img => {
    img.addEventListener("click", () => {
        if (img.classList.contains("zoomed")) {
            img.classList.remove("zoomed");
            document.querySelector(".overlay")?.remove();
        } else {
            images.forEach(i => i.classList.remove("zoomed"));
            const overlay = document.createElement("div");
            overlay.className = "overlay";
            overlay.onclick = () => {
                img.classList.remove("zoomed");
                overlay.remove();
            };
            document.body.appendChild(overlay);
            img.classList.add("zoomed");
        }
    });
});
</script>

</body>
</html>
