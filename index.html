<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* 🌸 BORDER IMAGES */
.border {
    position: absolute;
    display: flex;
    gap: 28px;
    z-index: 5;
}

.border img {
    width: 110px;
    height: 140px;
    object-fit: cover;
    border-radius: 18px;
    opacity: 0.6;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* TOP */
.border.top {
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
}

/* BOTTOM */
.border.bottom {
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
}

/* LEFT */
.border.left {
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    flex-direction: column;
}

/* RIGHT */
.border.right {
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    flex-direction: column;
}

/* 🌟 CENTER FLOATING TEXT */
.center-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    animation: floatText 4s ease-in-out infinite;
}

@keyframes floatText {
    0% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-22px); }
    100% { transform: translate(-50%, -50%) translateY(0); }
}

.center-text h1 {
    font-size: 30px;
    font-weight: 800;
    color: #111;
    text-shadow:
        0 3px 8px rgba(0,0,0,0.25),
        0 0 16px rgba(255,105,180,0.6);
}

.center-text p {
    font-size: 18px;
    font-weight: 600;
}

/* 🎁 GIFT */
.gift-box {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 120px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 30;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -14px); }
}

/* 🐰 BUNNY */
.bunny {
    position: fixed;
    bottom: -260px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    transition: bottom 1s ease;
    z-index: 35;
}

.bunny.show {
    bottom: 150px;
}

/* ✨ SPARKLES */
.sparkle {
    position: fixed;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 900ms ease-out forwards;
    z-index: 50;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
    }
}

/* 🌧️ FALLING SPARKLES */
.sparkle-fall {
    position: fixed;
    top: -10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: fall linear forwards;
    z-index: 45;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- TOP BORDER -->
<div class="border top">
    <img src="1000037570.jpeg">
    <img src="1000037580.jpeg">
</div>

<!-- LEFT BORDER -->
<div class="border left">
    <img src="1000375141.jpeg">
    <img src="1000386482.jpeg">
</div>

<!-- RIGHT BORDER -->
<div class="border right">
    <img src="1000375158.jpeg">
    <img src="1000386486.jpeg">
</div>

<!-- BOTTOM BORDER -->
<div class="border bottom">
    <img src="1000385134.jpeg">
    <img src="1000385152.jpeg">
</div>

<!-- 🌟 CENTER TEXT -->
<div class="center-text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- 🎁 -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- 🐰 -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}

/* 💥 TAP SPARKLE BLAST */
function sparkleBlast(x, y) {
    for (let i = 0; i < 40; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = x + "px";
        s.style.top = y + "px";
        s.style.background =
            ["#ff4d6d","#ffd166","#9b5de5","#00f5d4","#ffafcc","#cdb4db"]
            [Math.floor(Math.random() * 6)];
        s.style.setProperty("--x", (Math.random() * 240 - 120) + "px");
        s.style.setProperty("--y", (Math.random() * 240 - 120) + "px");
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 900);
    }
}

/* 🌧️ CONTINUOUS FALLING SPARKLES (150–200) */
setInterval(() => {
    const count = Math.floor(Math.random() * 51) + 150;
    for (let i = 0; i < count; i++) {
        const f = document.createElement("div");
        f.className = "sparkle-fall";
        f.style.left = Math.random() * 100 + "vw";
        f.style.background =
            ["#ff4d6d","#ffd166","#9b5de5","#00f5d4","#ffafcc","#cdb4db"]
            [Math.floor(Math.random() * 6)];
        f.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 6000);
    }
}, 2600);

document.addEventListener("click", e => sparkleBlast(e.clientX, e.clientY));
document.addEventListener("touchstart", e => {
    const t = e.touches[0];
    sparkleBlast(t.clientX, t.clientY);
});
</script>

</body>
</html>
