<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* IMAGE GRID – NO OVERLAP */
.collage {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 40px 20px 160px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 28px;
    justify-items: center;
}

.collage img {
    width: 150px;
    height: 170px;
    object-fit: cover;
    border-radius: 16px;
    opacity: 0.6;
}

/* FLOATING TEXT */
.text {
    position: sticky;
    top: 18%;
    text-align: center;
    margin: 40px auto;
    z-index: 20;
    animation: floatText 3.5s ease-in-out infinite;
}

@keyframes floatText {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-20px); }
    100% { transform: translateY(0); }
}

.text h1 {
    font-size: 28px;
    font-weight: 800;
    text-shadow:
        0 2px 6px rgba(0,0,0,0.25),
        0 0 14px rgba(255,105,180,0.6);
}

.text p {
    font-size: 17px;
    font-weight: 600;
    text-shadow:
        0 1px 4px rgba(0,0,0,0.2),
        0 0 10px rgba(255,182,193,0.6);
}

/* 🎁 Gift */
.gift-box {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 130px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 30;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -15px); }
}

/* Bunny */
.bunny {
    position: fixed;
    bottom: -250px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    transition: bottom 1s ease;
    z-index: 35;
}

.bunny.show {
    bottom: 140px;
}

/* Sparkles */
.sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 900ms ease-out forwards;
    z-index: 50;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- FLOATING TEXT -->
<div class="text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- IMAGE GRID -->
<div class="collage">
    <img src="1000037570.jpeg">
    <img src="1000037580.jpeg">
    <img src="1000375141.jpeg">
    <img src="1000375155.jpeg">
    <img src="1000375158.jpeg">
    <img src="1000385134.jpeg">
    <img src="1000385152.jpeg">
    <img src="1000386482.jpeg">
    <img src="1000386486.jpeg">
</div>

<!-- Gift -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- Bunny -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}

/* Sparkle blast */
function sparkleBlast(x, y) {
    for (let i = 0; i < 28; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = x + "px";
        s.style.top = y + "px";
        s.style.background =
            ["#ff4d6d","#ffd166","#9b5de5","#00f5d4","#ffafcc","#cdb4db"]
            [Math.floor(Math.random() * 6)];
        s.style.setProperty("--x", (Math.random() * 220 - 110) + "px");
        s.style.setProperty("--y", (Math.random() * 220 - 110) + "px");
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 900);
    }
}

document.addEventListener("click", e => sparkleBlast(e.clientX, e.clientY));
document.addEventListener("touchstart", e => {
    const t = e.touches[0];
    sparkleBlast(t.clientX, t.clientY);
});
</script>

</body>
</html>
