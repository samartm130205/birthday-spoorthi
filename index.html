<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Spoorthiii 💝</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* ✨ SPARKLES */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(#8a4cff 1.2px, transparent 1.2px);
    background-size: 26px 26px;
    opacity: 0.35;
    pointer-events: none;
}

/* 🖼️ IMAGE STYLE */
.frame img {
    width: 105px;
    height: 135px;
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.15);
}

/* 🔝 TOP */
.frame.top {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
}

/* ⬅️ LEFT */
.frame.left {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 34px;
}

/* ➡️ RIGHT */
.frame.right {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 34px;
}

/* 🔽 BOTTOM (MORE SPACE) */
.frame.bottom {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 70px;
}

/* 💝 CENTER TEXT */
.center-text {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
}

.center-text h1 {
    font-size: 30px;
    font-weight: 800;
}

.center-text p {
    font-size: 18px;
    font-weight: 600;
}

/* 🎁 GIFT */
.gift-box {
    margin-top: 20px;
    font-size: 90px;
    cursor: pointer;
    animation: bounce 1.4s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* 🐰 BUNNY */
.bunny {
    margin-top: 18px;
    width: 200px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.8s ease;
}

.bunny.show {
    opacity: 1;
    transform: scale(1);
}
</style>
</head>

<body>

<!-- 🔝 TOP 4 -->
<div class="frame top">
    <img src="1000037570.jpeg">
    <img src="1000037580.jpeg">
    <img src="1000375141.jpeg">
    <img src="IMG_5869.jpeg">
</div>

<!-- ⬅️ LEFT 4 -->
<div class="frame left">
    <img src="1000386482.jpeg">
    <img src="1000375155.jpeg">
    <img src="1000385152.jpeg">
    <img src="IMG_5870.jpeg">
</div>

<!-- ➡️ RIGHT 4 -->
<div class="frame right">
    <img src="1000375158.jpeg">
    <img src="1000386486.jpeg">
    <img src="1000385134.jpeg">
    <img src="IMG_5871.jpeg">
</div>

<!-- 🔽 BOTTOM 4 -->
<div class="frame bottom">
    <img src="IMG_5872.jpeg">
    <img src="IMG_5873.jpeg">
    <img src="IMG_5881.jpeg">
    <img src="IMG_5882.jpeg">
</div>

<!-- 💝 CENTER -->
<div class="center-text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>

    <!-- 🎁 -->
    <div class="gift-box" onclick="openGift()">🎁</div>

    <!-- 🐰 -->
    <img src="IMG_5845.gif" class="bunny" id="bunny">
</div>

<script>
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}
</script>

</body>
</html>
