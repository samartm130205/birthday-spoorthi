<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Spoorthiii 💝</title>

<!-- 🌸 FANCY FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* ================= COVER PAGE ================= */
.cover {
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom right, #ff9a9e, #fad0c4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 1s ease, visibility 1s ease;
}

.cover.hide {
    opacity: 0;
    visibility: hidden;
}

.cover-card {
    text-align: center;
    padding: 40px;
    border-radius: 30px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    animation: floatCard 3s ease-in-out infinite;
}

@keyframes floatCard {
    50% { transform: translateY(-15px); }
}

.cover-card h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    margin: 0;
    color: #222;
}

.cover-card p {
    font-size: 18px;
    margin: 15px 0 25px;
    font-weight: 600;
}

.cover-card button {
    font-size: 18px;
    padding: 12px 30px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(to right, #ff6a88, #ff99ac);
    color: #fff;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
}

.cover-card button:hover {
    transform: scale(1.05);
}

/* ================= MAIN PAGE ================= */
.main {
    opacity: 0;
    transition: opacity 1s ease;
}

.main.show {
    opacity: 1;
}

/* 🌧️ FALLING SPARKLES */
.sparkle {
    position: fixed;
    top: -10px;
    width: 4px;
    height: 4px;
    background: rgba(120, 60, 200, 0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: fall linear;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}

/* 🚀 CORNER SPARKLES */
.corner-sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: rgba(160, 90, 255, 0.95);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
}

/* 🖼️ IMAGE STYLE */
.frame img {
    width: 105px;
    height: 135px;
    object-fit: cover;
    border-radius: 18px;
    opacity: 0.7;
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
}

/* FRAMES */
.frame.top, .frame.bottom {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 90px;
}
.frame.top { top: 25px; }
.frame.bottom { bottom: 40px; }

.frame.left, .frame.right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 90px;
}
.frame.left { left: 22px; }
.frame.right { right: 22px; }

/* 💝 CENTER TEXT */
.center-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    animation: floatText 4s ease-in-out infinite;
}

@keyframes floatText {
    50% { transform: translate(-50%, -50%) translateY(-20px); }
}

.center-text h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 48px;
    color: #111;
}

.center-text p {
    font-size: 18px;
    font-weight: 600;
}

/* 🎁 */
.gift-box {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 90px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 20;
}

@keyframes bounce {
    50% { transform: translate(-50%, -15px); }
}

/* 🐰 */
.bunny {
    position: absolute;
    top: 68%;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    opacity: 0;
    transition: all 1s ease;
    z-index: 25;
}

.bunny.show {
    opacity: 1;
    transform: translate(-50%, -30px);
}
</style>
</head>

<body>

<!-- 🌸 COVER PAGE -->
<div class="cover" id="cover" onclick="openCard()">
    <div class="cover-card">
        <h1>Happy Birthday 💝</h1>
        <p>A special card just for you ✨</p>
        <button>Open Card 🎀</button>
    </div>
</div>

<!-- 🌸 MAIN PAGE -->
<div class="main" id="main">

<div class="frame top">
    <img src="1000037570.jpeg">
    <img src="1000037580.jpeg">
    <img src="1000375141.jpeg">
    <img src="1000375155.jpeg">
</div>

<div class="frame left">
    <img src="1000386482.jpeg">
    <img src="1000386486.jpeg">
    <img src="1000385134.jpeg">
    <img src="IMG_5869.jpeg">
</div>

<div class="frame right">
    <img src="1000375158.jpeg">
    <img src="1000385152.jpeg">
    <img src="IMG_5870.jpeg">
    <img src="IMG_5871.jpeg">
</div>

<div class="frame bottom">
    <img src="IMG_5872.jpeg">
    <img src="IMG_5873.jpeg">
    <img src="IMG_5881.jpeg">
    <img src="IMG_5882.jpeg">
</div>

<div class="center-text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<div class="gift-box" onclick="openGift()">🎁</div>
<img src="IMG_5845.gif" class="bunny" id="bunny">

</div>

<script>
function openCard() {
    document.getElementById("cover").classList.add("hide");
    document.getElementById("main").classList.add("show");
}

/* Sparkles */
function createSparkle() {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (3 + Math.random() * 4) + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 8000);
}
setInterval(() => { for (let i = 0; i < 6; i++) createSparkle(); }, 200);

/* Gift */
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}
</script>

</body>
</html>
