<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Spoorthiii 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffd1dc, #f7a8b8);
    position: relative;
}

/* CENTER STACK (TEXT + GIFT + BUNNY) */
.center-stack {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 6;
}

/* TEXT */
.center-stack h1 {
    font-size: 24px;
    color: #000;
}

.center-stack p {
    margin-top: 10px;
    font-size: 14px;
}

/* GIFT */
.gift {
    font-size: 80px;
    margin-top: 25px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* BUNNY */
.bunny {
    width: 120px;
    margin-top: 25px;
}

/* IMAGE STYLE */
.photo {
    width: 95px;
    height: 120px;
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* TOP */
.top {
    position: absolute;
    top: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 55px;
}

/* LEFT */
.left {
    position: absolute;
    left: 25px;
    top: 180px;
    display: flex;
    flex-direction: column;
    gap: 55px;
}

/* RIGHT */
.right {
    position: absolute;
    right: 25px;
    top: 180px;
    display: flex;
    flex-direction: column;
    gap: 55px;
}

/* BOTTOM (EXTRA SPACE) */
.bottom-left {
    position: absolute;
    bottom: 260px;
    left: 15%;
}

.bottom-right {
    position: absolute;
    bottom: 260px;
    right: 15%;
}

/* SPARKLES */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: rgba(160, 0, 255, 0.8);
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-10px); opacity: 1; }
    to { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
    <img src="1000037570.jpeg" class="photo">
    <img src="1000037580.jpeg" class="photo">
    <img src="1000375141.jpeg" class="photo">
    <img src="1000375155.jpeg" class="photo">
</div>

<!-- LEFT -->
<div class="left">
    <img src="1000375158.jpeg" class="photo">
    <img src="1000385134.jpeg" class="photo">
    <img src="1000385152.jpeg" class="photo">
    <img src="1000386482.jpeg" class="photo">
</div>

<!-- RIGHT -->
<div class="right">
    <img src="1000386486.jpeg" class="photo">
    <img src="IMG_5869.jpeg" class="photo">
    <img src="IMG_5870.jpeg" class="photo">
    <img src="IMG_5871.jpeg" class="photo">
</div>

<!-- CENTER STACK -->
<div class="center-stack">
    <h1>Happiest Birthday Spoorthiii 💝</h1>
    <p>
        Lots and lots of love to you 🥹✨<br>
        Stay blessed always 😊
    </p>

    <div class="gift">🎁</div>

    <img src="IMG_5845.gif" class="bunny">
</div>

<!-- BOTTOM -->
<img src="IMG_5872.jpeg" class="photo bottom-left">
<img src="IMG_5873.jpeg" class="photo bottom-right">

<script>
/* SPARKLES */
for (let i = 0; i < 180; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (3 + Math.random() * 4) + "s";
    s.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(s);
}
</script>

</body>
</html>
