<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* Background collage */
.collage {
    position: fixed;
    inset: 0;
    z-index: -1;
}

.collage img {
    position: absolute;
    width: 140px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    opacity: 0.35;
}

/* Center card */
.card {
    position: relative;
    background: white;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    width: 85%;
    max-width: 420px;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
}

h1 {
    color: #ff4d6d;
}

.message {
    font-size: 15px;
    line-height: 1.6;
    margin-top: 15px;
}

.heart {
    font-size: 40px;
    animation: beat 1s infinite;
    margin-top: 12px;
}

@keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.25); }
}

/* Sparkles */
.sparkle {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear forwards;
    z-index: 100;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- 🔴 IMPORTANT: replace image names with your real ones -->
<div class="collage">
    <img src="images/1000037570.jpeg" style="top:5%; left:8%;">
    <img src="images/1000037580.jpeg" style="top:20%; right:10%;">
    <img src="images/1000375141.jpeg" style="bottom:15%; left:12%;">
    <img src="images/1000375155.jpeg" style="bottom:10%; right:15%;">
    <img src="images/1000375158.jpeg" style="top:40%; left:35%;">
</div>

<div class="card">
    <h1>Happiest Birthday Sassa 💝🐇</h1>

    <div class="message">
        Lots and lots of love to you 🥰🫶🏻 Stay blessed always 😇✨  
        May all your dreams come true and make everyone proud 💪🏻🥹  
        <br><br>
        You mean a lot to me 💝🥹  
        You have such a pure, kind and caring heart and I feel truly lucky  
        and grateful to have you in my life 🫶🏻💗
    </div>

    <div class="heart">❤️</div>
</div>
<script>
function createSparkle() {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.innerText = "✨";
    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.fontSize = Math.random() * 15 + 15 + "px";
    sparkle.style.animationDuration = Math.random() * 3 + 3 + "s";

    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 6000);
}

/* keep sparkles falling until page is closed */
setInterval(createSparkle, 200);
</script>
    


</body>
</html>
