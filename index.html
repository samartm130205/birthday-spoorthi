<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* Background collage */
.collage {
    position: fixed;
    inset: 0;
    z-index: -1;
}

.collage img {
    position: absolute;
    width: 140px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    opacity: 0.45;
    cursor: pointer;
    animation: floatImg 8s ease-in-out infinite;
    transition: transform 0.5s ease, opacity 0.5s ease;
}

/* Floating images */
@keyframes floatImg {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-25px); }
    100% { transform: translateY(0); }
}

/* Grow on touch */
.collage img.active {
    transform: scale(2.2) !important;
    opacity: 1;
    z-index: 999;
    animation: none;
}

/* Dark overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 998;
}

/* Moving text */
.floating-text {
    position: absolute;
    width: 90%;
    max-width: 500px;
    text-align: center;
    color: #000000; /* ✅ BLACK TEXT */
    font-size: 18px;
    line-height: 1.7;
    animation: moveText 18s linear infinite alternate;
    text-shadow: 0 2px 6px rgba(255,255,255,0.6);
}

h1 {
    color: #000000; /* ✅ BLACK HEADING */
    margin-bottom: 15px;
}

.heart {
    font-size: 42px;
    margin-top: 15px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.3); }
}

/* Text movement */
@keyframes moveText {
    0%   { top: 10%; left: 5%; }
    25%  { top: 70%; left: 10%; }
    50%  { top: 40%; left: 55%; }
    75%  { top: 15%; left: 45%; }
    100% { top: 60%; left: 20%; }
}

/* Confetti */
.confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    animation: fall linear forwards;
    z-index: 100;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- Images -->
<div class="collage">
    <img src="1000037570.jpeg" style="top:5%; left:8%;">
    <img src="1000037580.jpeg" style="top:20%; right:10%;">
    <img src="1000375141.jpeg" style="bottom:15%; left:12%;">
    <img src="1000375155.jpeg" style="bottom:10%; right:15%;">
    <img src="1000375158.jpeg" style="top:40%; left:35%;">
</div>

<!-- Moving Text -->
<div class="floating-text">
    <h1>Happiest Birthday Sassa 💝🐇</h1>
    Lots and lots of love to you 🥰🫶🏻 Stay blessed always 😇✨  
    May all your dreams come true and make everyone proud 💪🏻🥹  
    <br><br>
    You mean a lot to me 💝🥹  
    You have such a pure, kind and caring heart and I feel truly lucky  
    and grateful to have you in my life 🫶🏻💗
    <div class="heart">❤️</div>
</div>

<script>
// Confetti
function createConfetti() {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.backgroundColor =
        ["#ff4d6d","#ffb703","#9b5de5","#00f5d4","#ffafcc"]
        [Math.floor(Math.random()*5)];
    c.style.animationDuration = (Math.random()*3+3)+"s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 6000);
}
setInterval(createConfetti, 150);

// Image tap animation
const images = document.querySelectorAll(".collage img");

images.forEach(img => {
    img.addEventListener("click", () => {
        const active = img.classList.contains("active");
        images.forEach(i => i.classList.remove("active"));
        document.querySelector(".overlay")?.remove();

        if (!active) {
            const overlay = document.createElement("div");
            overlay.className = "overlay";
            overlay.onclick = () => {
                img.classList.remove("active");
                overlay.remove();
            };
            document.body.appendChild(overlay);
            img.classList.add("active");
        }
    });
});
</script>

</body>
</html>
