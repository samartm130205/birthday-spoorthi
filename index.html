<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* Floating Images */
.collage img {
    position: absolute;
    width: 130px;
    height: 170px;
    object-fit: cover;
    border-radius: 16px;
    opacity: 0.5;
    animation: float 7s ease-in-out infinite;
    transition: transform 0.4s ease, opacity 0.4s ease;
    cursor: pointer;
}

.collage img:active {
    transform: scale(1.8);
    opacity: 1;
    z-index: 10;
}

/* Floating animation */
@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0); }
}

/* Moving Text */
.text {
    position: absolute;
    color: black;
    text-align: center;
    width: 90%;
    left: 5%;
    font-size: 18px;
    animation: moveText 14s linear infinite;
}

@keyframes moveText {
    0%   { top: 8%; left: 5%; }
    25%  { top: 30%; left: 40%; }
    50%  { top: 55%; left: 10%; }
    75%  { top: 35%; left: 45%; }
    100% { top: 8%; left: 5%; }
}

h1 {
    font-size: 26px;
}

/* Gift Box */
.gift-box {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 60px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 20;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -12px); }
}

/* Bunny GIF */
.bunny {
    position: fixed;
    bottom: -250px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    transition: bottom 1s ease;
    z-index: 25;
}

.bunny.show {
    bottom: 120px;
}

/* Confetti */
.confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    animation: fall linear forwards;
    z-index: 30;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- Background Images -->
<div class="collage">
    <img src="1000037570.jpeg" style="top:5%; left:5%;">
    <img src="1000037580.jpeg" style="top:20%; right:10%;">
    <img src="1000375141.jpeg" style="bottom:15%; left:10%;">
    <img src="1000375155.jpeg" style="bottom:10%; right:12%;">
    <img src="1000375158.jpeg" style="top:40%; left:40%;">
</div>

<!-- Moving Text -->
<div class="text">
    <h1>Happiest Birthday Spoorthiii💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻 Stay blessed always 😇✨ <br><br>   
    </p>
</div>

<!-- Gift Box -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- Bunny GIF (UPDATED NAME) -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
// Confetti
function createConfetti() {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.backgroundColor =
        ["#ff4d6d", "#ffb703", "#9b5de5", "#00f5d4", "#ffafcc"]
        [Math.floor(Math.random() * 5)];
    c.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 6000);
}
setInterval(createConfetti, 180);

// Gift Box Click
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}
</script>

</body>
</html>
