<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Spoorthiii 💝</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* 🖼️ IMAGE STYLE */
.frame img {
    width: 110px;
    height: 140px;
    object-fit: cover;
    border-radius: 18px;
    opacity: 0.7;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* 🔝 TOP */
.frame.top {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
}

/* 🔽 BOTTOM */
.frame.bottom {
    position: absolute;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
}

/* ⬅️ LEFT */
.frame.left {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 32px;
}

/* ➡️ RIGHT */
.frame.right {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 32px;
}

/* 💝 CENTER FLOATING TEXT */
.center-text {
    position: absolute;
    top: 48%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    animation: floatText 4s ease-in-out infinite;
}

@keyframes floatText {
    0% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-24px); }
    100% { transform: translate(-50%, -50%) translateY(0); }
}

.center-text h1 {
    font-size: 32px;
    font-weight: 800;
    color: #111;
    text-shadow:
        0 4px 10px rgba(0,0,0,0.25),
        0 0 18px rgba(255,105,180,0.7);
}

.center-text p {
    font-size: 18px;
    font-weight: 600;
}

/* 🎁 GIFT */
.gift-box {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 120px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 30;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -14px); }
}

/* 🐰 BUNNY */
.bunny {
    position: fixed;
    bottom: -260px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    transition: bottom 1s ease;
    z-index: 35;
}

.bunny.show {
    bottom: 150px;
}
</style>
</head>

<body>

<!-- 🔝 TOP (4) -->
<div class="frame top">
    <img src="1000037570.jpeg">
    <img src="1000037580.jpeg">
    <img src="1000375141.jpeg">
    <img src="1000375155.jpeg">
</div>

<!-- ⬅️ LEFT (4) -->
<div class="frame left">
    <img src="1000375158.jpeg">
    <img src="1000385134.jpeg">
    <img src="1000385152.jpeg">
    <img src="1000386482.jpeg">
</div>

<!-- ➡️ RIGHT (4) -->
<div class="frame right">
    <img src="1000386486.jpeg">
    <img src="IMG_5869.jpeg">
    <img src="IMG_5870.jpeg">
    <img src="IMG_5871.jpeg">
</div>

<!-- 🔽 BOTTOM (2) -->
<div class="frame bottom">
    <img src="IMG_5872.jpeg">
    <img src="IMG_5873.jpeg">
</div>

<!-- 💝 CENTER TEXT -->
<div class="center-text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- 🎁 -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- 🐰 -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}
</script>

</body>
</html>
