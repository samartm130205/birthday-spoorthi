<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* Background Images – STATIC */
.collage img {
    position: absolute;
    width: 150px;
    height: 170px;
    object-fit: cover;
    border-radius: 16px;
    opacity: 0.5;
}

/* TEXT CONTAINER */
.text {
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    text-align: center;
    color: black;
    z-index: 10;

    /* 👇 ONLY TEXT FLOATS */
    animation: floatText 3.5s ease-in-out infinite;
}

@keyframes floatText {
    0%   { transform: translate(-50%, 0); }
    50%  { transform: translate(-50%, -20px); } /* CLEAR FLOAT */
    100% { transform: translate(-50%, 0); }
}

h1 {
    font-size: 26px;
}

/* 🎁 Gift */
.gift-box {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 130px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 20;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -15px); }
}

/* Bunny */
.bunny {
    position: fixed;
    bottom: -250px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    transition: bottom 1s ease;
    z-index: 25;
}

.bunny.show {
    bottom: 140px;
}

/* Confetti */
.confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    animation: fall linear forwards;
    z-index: 30;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- Images -->
<div class="collage">
    <img src="1000037570.jpeg" style="top:5%; left:5%;">
    <img src="1000037580.jpeg" style="top:20%; right:10%;">
    <img src="1000375141.jpeg" style="bottom:15%; left:10%;">
    <img src="1000375155.jpeg" style="bottom:10%; right:12%;">
    <img src="1000375158.jpeg" style="top:40%; left:40%;">
</div>

<!-- FLOATING TEXT -->
<div class="text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- Gift -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- Bunny -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
// Confetti
function createConfetti() {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.backgroundColor =
        ["#ff4d6d", "#ffb703", "#9b5de5", "#00f5d4", "#ffafcc"]
        [Math.floor(Math.random() * 5)];
    c.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 6000);
}
setInterval(createConfetti, 180);

// Gift click
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}
</script>

</body>
</html>
