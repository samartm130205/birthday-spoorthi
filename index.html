<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* Background Images – STATIC */
.collage img {
    position: absolute;
    width: 150px;
    height: 170px;
    object-fit: cover;
    border-radius: 16px;
    opacity: 0.55;
}

/* FLOATING TEXT */
.text {
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    text-align: center;
    color: #111;
    z-index: 15;
    animation: floatText 3.5s ease-in-out infinite;
}

@keyframes floatText {
    0%   { transform: translate(-50%, 0); }
    50%  { transform: translate(-50%, -22px); }
    100% { transform: translate(-50%, 0); }
}

.text h1 {
    font-size: 28px;
    font-weight: 800;
    text-shadow:
        0 2px 6px rgba(0,0,0,0.25),
        0 0 14px rgba(255,105,180,0.6);
}

.text p {
    font-size: 17px;
    font-weight: 600;
    text-shadow:
        0 1px 4px rgba(0,0,0,0.2),
        0 0 10px rgba(255,182,193,0.6);
}

/* 🎁 Gift */
.gift-box {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 130px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 20;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -15px); }
}

/* Bunny */
.bunny {
    position: fixed;
    bottom: -250px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    transition: bottom 1s ease;
    z-index: 25;
}

.bunny.show {
    bottom: 140px;
}

/* Sparkles */
.sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 900ms ease-out forwards;
    z-index: 50;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- 📸 COLLAGE IMAGES (ALL INCLUDED) -->
<div class="collage">
    <!-- Original images -->
    <img src="1000037570.jpeg" style="top:5%; left:5%;">
    <img src="1000037580.jpeg" style="top:20%; right:10%;">
    <img src="1000375141.jpeg" style="bottom:15%; left:10%;">
    <img src="1000375155.jpeg" style="bottom:10%; right:12%;">
    <img src="1000375158.jpeg" style="top:40%; left:40%;">

    <!-- Newly added images -->
    <img src="1000385134.jpeg" style="top:55%; right:5%;">
    <img src="1000385152.jpeg" style="top:65%; left:8%;">
    <img src="1000386482.jpeg" style="top:75%; right:35%;">
    <img src="1000386486.jpeg" style="top:30%; left:70%;">
</div>

<!-- FLOATING TEXT -->
<div class="text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- Gift -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- Bunny -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
// 🎁 Gift click
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}

/* ✨ SPARKLE BLAST ON TOUCH / CLICK */
function sparkleBlast(x, y) {
    for (let i = 0; i < 25; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = x + "px";
        s.style.top = y + "px";
        s.style.background =
            ["#ff4d6d","#ffd166","#9b5de5","#00f5d4","#ffafcc","#cdb4db"]
            [Math.floor(Math.random() * 6)];
        s.style.setProperty("--x", (Math.random() * 200 - 100) + "px");
        s.style.setProperty("--y", (Math.random() * 200 - 100) + "px");
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 900);
    }
}

/* Desktop click */
document.addEventListener("click", e => {
    sparkleBlast(e.clientX, e.clientY);
});

/* Mobile touch */
document.addEventListener("touchstart", e => {
    const t = e.touches[0];
    sparkleBlast(t.clientX, t.clientY);
});
</script>

</body>
</html>
