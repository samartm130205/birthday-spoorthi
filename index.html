<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Spoorthiii 💝</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* 🌟 SPARKLES */
.sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: radial-gradient(circle, #fff, #ff69b4);
    border-radius: 50%;
    pointer-events: none;
    animation: fall linear forwards;
}

@keyframes fall {
    from { transform: translateY(-10px); opacity: 1; }
    to { transform: translateY(110vh); opacity: 0; }
}

/* 🖼️ IMAGE STYLE */
.frame img {
    width: 105px;
    height: 135px;
    object-fit: cover;
    border-radius: 18px;
    opacity: 0.65;
    box-shadow: 0 8px 18px rgba(0,0,0,0.18);
}

/* FRAMES */
.frame.top {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 28px;
}

.frame.bottom {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 28px;
}

.frame.left {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.frame.right {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 30px;
}

/* 💝 CENTER TEXT */
.center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    animation: floatText 4s ease-in-out infinite;
}

@keyframes floatText {
    0% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-22px); }
    100% { transform: translate(-50%, -50%) translateY(0); }
}

.center-text h1 {
    font-size: 32px;
    font-weight: 800;
    color: #111;
    text-shadow: 0 3px 10px rgba(0,0,0,0.3);
}

.center-text p {
    font-size: 18px;
    font-weight: 600;
}

/* 🎁 GIFT */
.gift-box {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 120px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 20;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -14px); }
}

/* 🐰 BUNNY */
.bunny {
    position: fixed;
    bottom: -260px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    transition: bottom 1s ease;
    z-index: 25;
}

.bunny.show {
    bottom: 150px;
}
</style>
</head>

<body>

<!-- 🔝 TOP -->
<div class="frame top">
    <img src="IMG_5869.jpeg">
    <img src="IMG_5870.jpeg">
    <img src="IMG_5871.jpeg">
</div>

<!-- ⬅️ LEFT -->
<div class="frame left">
    <img src="IMG_5872.jpeg">
    <img src="IMG_5873.jpeg">
    <img src="IMG_5869.jpeg">
</div>

<!-- ➡️ RIGHT -->
<div class="frame right">
    <img src="IMG_5870.jpeg">
    <img src="IMG_5871.jpeg">
    <img src="IMG_5872.jpeg">
</div>

<!-- 🔽 BOTTOM -->
<div class="frame bottom">
    <img src="IMG_5873.jpeg">
    <img src="IMG_5869.jpeg">
</div>

<!-- 💝 CENTER -->
<div class="center-text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- 🎁 -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- 🐰 -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
/* 🎊 CONTINUOUS SPARKLES */
setInterval(() => {
    for (let i = 0; i < 4; i++) {
        createSparkle(Math.random() * window.innerWidth, -10);
    }
}, 120);

function createSparkle(x, y) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = x + "px";
    s.style.top = y + "px";
    s.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 6000);
}

/* 💥 TAP BLAST */
document.addEventListener("click", e => {
    for (let i = 0; i < 40; i++) {
        createSparkle(
            e.clientX + (Math.random() * 100 - 50),
            e.clientY + (Math.random() * 100 - 50)
        );
    }
});

/* 🎁 GIFT ACTION */
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}
</script>

</body>
</html>
