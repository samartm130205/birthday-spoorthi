<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Spoorthiii 💝</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* 🌟 SPARKLES */
.sparkle {
    position: fixed;
    top: -10px;
    width: 4px;
    height: 4px;
    background: rgba(120, 60, 200, 0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: fall linear;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}

/* 🖼 IMAGE STYLE */
.frame img {
    width: 105px;
    height: 135px;
    object-fit: cover;
    border-radius: 18px;
    opacity: 0.7;
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
}

/* 🔝 TOP */
.frame.top {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 55px;
}

/* 🔽 BOTTOM (EXTRA SPACE) */
.frame.bottom {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 90px;
}

/* ⬅ LEFT */
.frame.left {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 55px;
}

/* ➡ RIGHT */
.frame.right {
    position: absolute;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 55px;
}

/* 💝 CENTER TEXT */
.center-text {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    animation: floatText 4s ease-in-out infinite;
}

@keyframes floatText {
    0%,100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-20px); }
}

.center-text h1 {
    font-size: 30px;
    font-weight: 800;
}

.center-text p {
    font-size: 18px;
    font-weight: 600;
}

/* 🎁 GIFT */
.gift-box {
    position: absolute;
    top: 58%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 90px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 20;
}

@keyframes bounce {
    50% { transform: translate(-50%, -15px); }
}

/* 🐰 BUNNY */
.bunny {
    position: absolute;
    top: 70%;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    opacity: 0;
    transition: all 1s ease;
    z-index: 25;
}

.bunny.show {
    opacity: 1;
    transform: translate(-50%, -30px);
}
</style>
</head>

<body>

<!-- 🔝 TOP 4 -->
<div class="frame top">
    <img src="1000037570.jpeg">
    <img src="1000037580.jpeg">
    <img src="1000375141.jpeg">
    <img src="1000375155.jpeg">
</div>

<!-- ⬅ LEFT 4 -->
<div class="frame left">
    <img src="1000386482.jpeg">
    <img src="1000386486.jpeg">
    <img src="1000385134.jpeg">
    <img src="IMG_5869.jpeg">
</div>

<!-- ➡ RIGHT 4 -->
<div class="frame right">
    <img src="1000375158.jpeg">
    <img src="1000385152.jpeg">
    <img src="IMG_5870.jpeg">
    <img src="IMG_5871.jpeg">
</div>

<!-- 🔽 BOTTOM 4 (MORE SPACE) -->
<div class="frame bottom">
    <img src="IMG_5872.jpeg">
    <img src="IMG_5873.jpeg">
    <img src="IMG_5881.jpeg">
    <img src="IMG_5882.jpeg">
</div>

<!-- 💝 CENTER TEXT -->
<div class="center-text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- 🎁 -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- 🐰 -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<!-- 🌟 SPARKLES SCRIPT -->
<script>
function createSparkle() {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (3 + Math.random() * 4) + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 8000);
}

setInterval(() => {
    for (let i = 0; i < 6; i++) createSparkle();
}, 200);

function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}
</script>

</body>
</html>
