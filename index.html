<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Spoorthiii 💝</title>

<!-- 🌸 FANCY FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* 🌧️ FALLING SPARKLES */
.sparkle {
    position: fixed;
    top: -10px;
    width: 4px;
    height: 4px;
    background: rgba(120, 60, 200, 0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: fall linear;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}

/* 🚀 CORNER SPARKLES */
.corner-sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: rgba(160, 90, 255, 0.95);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
}

/* 🖼️ IMAGE STYLE */
.frame img {
    width: 105px;
    height: 135px;
    object-fit: cover;
    border-radius: 18px;
    opacity: 0.7;
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
}

/* 🔝 TOP */
.frame.top {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 90px;
}

/* 🔽 BOTTOM */
.frame.bottom {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 90px;
}

/* ⬅ LEFT */
.frame.left {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 90px;
}

/* ➡ RIGHT */
.frame.right {
    position: absolute;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 90px;
}

/* 💝 CENTER TEXT */
.center-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    animation: floatText 4s ease-in-out infinite;
}

@keyframes floatText {
    0%,100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-20px); }
}

.center-text h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 48px;
    font-weight: 400;
    color: #111;
    text-shadow:
        0 4px 10px rgba(0,0,0,0.25),
        0 0 20px rgba(255,105,180,0.6);
}

.center-text p {
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    font-weight: 600;
    margin-top: 10px;
}

/* 🎁 GIFT */
.gift-box {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 90px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 20;
}

@keyframes bounce {
    50% { transform: translate(-50%, -15px); }
}

/* 🐰 BUNNY */
.bunny {
    position: absolute;
    top: 68%;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    opacity: 0;
    transition: all 1s ease;
    z-index: 25;
}

.bunny.show {
    opacity: 1;
    transform: translate(-50%, -30px);
}
</style>
</head>

<body>

<!-- 🔝 TOP -->
<div class="frame top">
    <img src="1000037570.jpeg">
    <img src="1000037580.jpeg">
    <img src="1000375141.jpeg">
    <img src="1000375155.jpeg">
</div>

<!-- ⬅ LEFT -->
<div class="frame left">
    <img src="1000386482.jpeg">
    <img src="1000386486.jpeg">
    <img src="1000385134.jpeg">
    <img src="IMG_5869.jpeg">
</div>

<!-- ➡ RIGHT -->
<div class="frame right">
    <img src="1000375158.jpeg">
    <img src="1000385152.jpeg">
    <img src="IMG_5870.jpeg">
    <img src="IMG_5871.jpeg">
</div>

<!-- 🔽 BOTTOM -->
<div class="frame bottom">
    <img src="IMG_5872.jpeg">
    <img src="IMG_5873.jpeg">
    <img src="IMG_5881.jpeg">
    <img src="IMG_5882.jpeg">
</div>

<!-- 💝 CENTER -->
<div class="center-text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- 🎁 -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- 🐰 -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
/* 🌧️ FALLING SPARKLES */
function createSparkle() {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (3 + Math.random() * 4) + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 8000);
}
setInterval(() => {
    for (let i = 0; i < 6; i++) createSparkle();
}, 200);

/* 🚀 CORNER SPARKLES */
function shootFromCorner(x, y) {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    for (let i = 0; i < 12; i++) {
        const s = document.createElement("div");
        s.className = "corner-sparkle";
        s.style.left = x + "px";
        s.style.top = y + "px";

        const angle = Math.atan2(cy - y, cx - x);
        const distance = 500 + Math.random() * 300;

        s.animate([
            { transform: "translate(0,0)", opacity: 1 },
            { transform: `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`, opacity: 0 }
        ], { duration: 1400, easing: "ease-out" });

        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2000);
    }
}

setInterval(() => {
    shootFromCorner(0, 0);
    shootFromCorner(window.innerWidth, 0);
    shootFromCorner(0, window.innerHeight);
    shootFromCorner(window.innerWidth, window.innerHeight);
}, 1800);

/* 🎁 GIFT */
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}
</script>

</body>
</html>
