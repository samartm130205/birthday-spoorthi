<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
    overflow-x: hidden;
}

/* IMAGE GRID */
.collage {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    padding: 40px 30px 140px;
    max-width: 1100px;
    margin: auto;
}

.collage img {
    width: 100%;
    max-width: 160px;
    height: 180px;
    object-fit: cover;
    border-radius: 16px;
    opacity: 0.6;
    justify-self: center;
}

/* FLOATING TEXT */
.text {
    text-align: center;
    margin: 40px auto 10px;
    animation: floatText 3.5s ease-in-out infinite;
}

@keyframes floatText {
    0% { transform: translateY(0); }
    50% { transform: translateY(-22px); }
    100% { transform: translateY(0); }
}

.text h1 {
    font-size: 28px;
    font-weight: 800;
    text-shadow:
        0 2px 6px rgba(0,0,0,0.25),
        0 0 14px rgba(255,105,180,0.6);
}

.text p {
    font-size: 17px;
    font-weight: 600;
}

/* GIFT */
.gift-box {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 120px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    z-index: 20;
}

@keyframes bounce {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -14px); }
}

/* BUNNY */
.bunny {
    position: fixed;
    bottom: -250px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    transition: bottom 1s ease;
    z-index: 25;
}

.bunny.show {
    bottom: 150px;
}

/* SPARKLE BLAST */
.sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 900ms ease-out forwards;
    z-index: 50;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
    }
}

/* FALLING SPARKLES */
.sparkle-fall {
    position: fixed;
    top: -10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    animation: fallDown linear forwards;
    z-index: 45;
}

@keyframes fallDown {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- TEXT -->
<div class="text">
    <h1>Happiest Birthday Spoorthiii 💝🥹✨</h1>
    <p>
        Lots and lots of love to you 🥰🫶🏻<br>
        Stay blessed always 😇✨
    </p>
</div>

<!-- IMAGES -->
<div class="collage">
    <img src="1000037570.jpeg">
    <img src="1000037580.jpeg">
    <img src="1000375155.jpeg">

    <img src="1000375141.jpeg">
    <img src="1000386482.jpeg">
    <img src="1000375158.jpeg">

    <img src="1000385134.jpeg">
    <img src="1000386486.jpeg">
    <img src="1000385152.jpeg">
</div>

<!-- GIFT -->
<div class="gift-box" onclick="openGift()">🎁</div>

<!-- BUNNY -->
<img src="IMG_5845.gif" class="bunny" id="bunny">

<script>
function openGift() {
    document.querySelector(".gift-box").innerText = "🎊";
    document.getElementById("bunny").classList.add("show");
}

/* 💥 TAP SPARKLE BLAST */
function sparkleBlast(x, y) {
    for (let i = 0; i < 30; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = x + "px";
        s.style.top = y + "px";
        s.style.background =
            ["#ff4d6d","#ffd166","#9b5de5","#00f5d4","#ffafcc","#cdb4db"]
            [Math.floor(Math.random() * 6)];
        s.style.setProperty("--x", (Math.random() * 240 - 120) + "px");
        s.style.setProperty("--y", (Math.random() * 240 - 120) + "px");
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 900);
    }
}

/* 🌧️ CONTINUOUS FALLING SPARKLES */
function spawnFallingSparkles() {
    const count = Math.floor(Math.random() * 51) + 150; // 150–200
    for (let i = 0; i < count; i++) {
        const f = document.createElement("div");
        f.className = "sparkle-fall";
        f.style.left = Math.random() * 100 + "vw";
        f.style.background =
            ["#ff4d6d","#ffd166","#9b5de5","#00f5d4","#ffafcc","#cdb4db"]
            [Math.floor(Math.random() * 6)];
        f.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 6000);
    }
}

/* CONTINUOUS LOOP (every 2.5 seconds) */
setInterval(spawnFallingSparkles, 2500);

/* CLICK / TOUCH BLAST */
document.addEventListener("click", e => sparkleBlast(e.clientX, e.clientY));
document.addEventListener("touchstart", e => {
    const t = e.touches[0];
    sparkleBlast(t.clientX, t.clientY);
});
</script>

</body>
</html>
