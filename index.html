<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sassa 💝</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* Background collage */
.collage {
    position: fixed;
    inset: 0;
    z-index: -1;
}

.collage img {
    position: absolute;
    width: 140px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    opacity: 0.4;
    cursor: pointer;
    animation: float 8s ease-in-out infinite;
    transition: transform 0.4s ease, opacity 0.4s ease;
}

.collage img:active {
    transform: scale(1.5);
    opacity: 1;
}

/* floating images */
@keyframes float {
    0% { transform: translate(0, 0); }
    50% { transform: translate(15px, -25px); }
    100% { transform: translate(0, 0); }
}

/* Moving text */
.text {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 40%;
    animation: moveText 10s linear infinite alternate;
    color: black;
    padding: 20px;
}

@keyframes moveText {
    0% { transform: translate(-30px, -30px); }
    50% { transform: translate(30px, 20px); }
    100% { transform: translate(-20px, 30px); }
}

h1 {
    font-size: 28px;
}

.message {
    font-size: 16px;
    line-height: 1.6;
}

/* Gift button */
.gift-box {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 60px;
    cursor: pointer;
    z-index: 200;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-10px); }
}

/* Bunny */
.bunny {
    position: fixed;
    bottom: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    display: none;
    animation: bunnyUp 1s forwards, dance 1s infinite;
    z-index: 300;
}

@keyframes bunnyUp {
    to { bottom: 120px; }
}

@keyframes dance {
    0% { transform: translateX(-50%) rotate(-5deg); }
    50% { transform: translateX(-50%) rotate(5deg); }
    100% { transform: translateX(-50%) rotate(-5deg); }
}

/* Confetti */
.confetti {
    position: fixed;
    top: -10px;
    width: 8px;
    height: 8px;
    animation: fall linear forwards;
    z-index: 100;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- Images -->
<div class="collage">
    <img src="1000037570.jpeg" style="top:5%; left:8%;">
    <img src="1000037580.jpeg" style="top:20%; right:10%;">
    <img src="1000375141.jpeg" style="bottom:15%; left:12%;">
    <img src="1000375155.jpeg" style="bottom:10%; right:15%;">
    <img src="1000375158.jpeg" style="top:40%; left:35%;">
</div>

<!-- Moving Text -->
<div class="text">
    <h1>Happiest Birthday Sassa 💝🐇</h1>
    <div class="message">
        Lots and lots of love to you 🥰🫶🏻 Stay blessed always 😇✨<br>
        May all your dreams come true and make everyone proud 💪🏻🥹<br><br>
        You mean a lot to me 💝🥹<br>
        You have such a pure, kind and caring heart 💗
    </div>
</div>

<!-- Gift Box -->
<div class="gift-box" id="gift">🎁</div>

<!-- Bunny -->
<img src="bunny.png" class="bunny" id="bunny">

<script>
// Confetti forever
setInterval(() => {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.backgroundColor =
        ["#ff4d6d", "#ffb703", "#9b5de5", "#00f5d4"]
        [Math.floor(Math.random() * 4)];
    c.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
}, 200);

// Gift click
const gift = document.getElementById("gift");
const bunny = document.getElementById("bunny");

gift.addEventListener("click", () => {
    gift.textContent = "🎊";
    bunny.style.display = "block";
});
</script>

</body>
</html>
